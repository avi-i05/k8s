kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-deployment
  namespace: practice
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80
      - name: sidecar-container
        image: busybox:latest
        command: ["sh", "-c", "while true; do echo Hello from the sidecar container; sleep 10; done"]
      restartPolicy: Always